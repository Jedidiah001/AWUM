<!doctype html>
<html><head><meta charset='utf-8'><title>NXT Developmental</title>
<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'></head>
<body class='bg-dark text-light'>
<div class='container py-4'>
  <h1>ROC NXT Developmental System</h1>
  <p class='text-secondary'>Manage prospects and call-ups to Alpha, Velocity, and Vanguard.</p>
  <div class='mb-3 d-flex gap-2'>
    <input id='faId' class='form-control' placeholder='Prospect free_agent_id'>
    <button class='btn btn-success' onclick='addProspect()'>Add Prospect</button>
  </div>
  <table class='table table-dark table-striped'><thead><tr><th>Name</th><th>Readiness</th><th>Priority</th><th>Stage</th><th>Action</th></tr></thead><tbody id='rows'></tbody></table>
</div>
<script>
async function refresh(){
 const r=await fetch('/api/developmental/dashboard'); const d=await r.json();
 const rows=(d.roster||[]).map(p=>`<tr><td>${p.wrestler_name}</td><td>${Number(p.readiness_score).toFixed(1)}</td><td>${Number(p.call_up_priority).toFixed(1)}</td><td>${p.stage}</td><td><button class='btn btn-sm btn-outline-info' onclick="callUp('${p.prospect_id}')">Call-up</button></td></tr>`).join('');
 document.getElementById('rows').innerHTML=rows;
}
async function addProspect(){
 const free_agent_id=document.getElementById('faId').value.trim();
 const r=await fetch('/api/developmental/add-prospect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({free_agent_id})});
 const d=await r.json(); if(!d.success) return alert(d.error||'error'); refresh();
}
async function callUp(prospect_id){
 const target_brand=prompt('Target brand? ROC Alpha / ROC Velocity / ROC Vanguard','ROC Alpha')||'ROC Alpha';
 const r=await fetch('/api/developmental/call-up',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prospect_id,target_brand})});
 const d=await r.json(); if(!d.success) return alert((d.error||'error') + ' | ' + (d.recommendation||'')); refresh();
}
refresh();
</script></body></html>
