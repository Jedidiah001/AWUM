<div class="container-fluid py-3">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h2>🎬 The Booker</h2>
      <p class="text-muted mb-0">AI Creative Assistant: suggestions, responses, and persistent Creative Notebook.</p>
    </div>
  </div>

  <div class="card mb-3">
    <div class="card-header">Assistant Personality</div>
    <div class="card-body row g-2 align-items-end">
      <div class="col-md-3">
        <label class="form-label">Persona</label>
        <select id="personality" class="form-select">
          <option value="veteran">The Veteran</option><option value="marketer">The Marketer</option>
          <option value="historian">The Historian</option><option value="anarchist">The Anarchist</option>
        </select>
      </div>
      <div class="col-md-3"><label class="form-label">Risk tolerance</label><input id="risk" type="range" min="0" max="1" step="0.05" class="form-range"></div>
      <div class="col-md-3"><label class="form-label">Story tempo</label><input id="tempo" type="range" min="0" max="1" step="0.05" class="form-range"></div>
      <div class="col-md-3"><button class="btn btn-primary" onclick="saveProfile()">Save profile</button></div>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-8">
      <div class="card">
        <div class="card-header d-flex justify-content-between"><span>Live Suggestions</span><button class="btn btn-sm btn-outline-primary" onclick="loadSuggestions()">Refresh</button></div>
        <div class="card-body" id="suggestions"></div>
      </div>
    </div>
    <div class="col-lg-4">
      <div class="card">
        <div class="card-header">Creative Notebook</div>
        <div class="card-body" id="notebook"></div>
      </div>
    </div>
  </div>
</div>

<script>
async function loadProfile(){const p=await fetchAPI('/api/booker/profile');personality.value=p.personality;risk.value=p.risk_tolerance;tempo.value=p.storytelling_tempo;}
async function saveProfile(){await fetchAPI('/api/booker/profile',{method:'PUT',body:JSON.stringify({personality:personality.value,risk_tolerance:risk.value,storytelling_tempo:tempo.value})});await loadProfile();showToast('Saved','success');}

function suggestionCard(s){
  const pr={urgent:'🔴 Urgent',opportunity:'🟡 Opportunity',spark:'🔵 Spark'}[s.priority]||s.priority;
  return `<div class="border rounded p-2 mb-2"><div class="d-flex justify-content-between"><strong>${pr} · ${s.category}</strong><span class="badge bg-secondary">${s.status}</span></div><h6 class="mt-2 mb-1">${s.headline}</h6><p class="mb-2">${s.rationale}</p><div class="btn-group btn-group-sm"><button class="btn btn-success" onclick="respond('${s.suggestion_id}','accept')">Accept</button><button class="btn btn-warning" onclick="respond('${s.suggestion_id}','modify')">Modify</button><button class="btn btn-danger" onclick="respond('${s.suggestion_id}','reject')">Reject</button><button class="btn btn-outline-info" onclick="respond('${s.suggestion_id}','pin')">Pin</button></div></div>`;
}
async function loadSuggestions(){
 const r=await fetchAPI('/api/booker/suggestions');
 suggestions.innerHTML=r.suggestions.length?r.suggestions.map(suggestionCard).join(''):'<p class="text-muted">No suggestions yet. Use API to create or let simulation generate.</p>';
}
async function respond(id,action){await fetchAPI(`/api/booker/suggestions/${id}/respond`,{method:'POST',body:JSON.stringify({action,note:`${action}ed from UI`})});await Promise.all([loadSuggestions(),loadNotebook()]);}
async function loadNotebook(){const n=await fetchAPI('/api/booker/notebook');notebook.innerHTML=n.entries.length?n.entries.map(e=>`<div class="mb-2"><strong>${e.title}</strong><div class="small text-muted">${e.created_at}</div><div>${e.body}</div></div>`).join(''):'<p class="text-muted">Notebook is empty.</p>';}
(async function init(){await loadProfile();await loadSuggestions();await loadNotebook();})();
</script>
